<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>LigaPádel — Inicio</title>
  <link rel="stylesheet" href="../ligas/css/style.css">
  <style>
    .chip { display:inline-flex; align-items:center; padding:2px 9px; border-radius:100px; font-size:10px; font-weight:800; }
    .c-borrador    { background:#f1f5f9; color:#64748b; }
    .c-inscripcion { background:#dbeafe; color:#1e40af; }
    .c-activa      { background:#dcfce7; color:#15803d; }
    .c-fase_final  { background:#fef9c3; color:#92400e; }
    .c-finalizada  { background:#f1f5f9; color:#64748b; }
    .cat-chip { display:inline-flex; padding:2px 8px; border-radius:100px; font-size:10px; font-weight:800; }
    .cat-m { background:#eff6ff; color:#1e40af; }
    .cat-f { background:#f3e8ff; color:#6d28d9; }
    .cat-x { background:#f0fdf4; color:#15803d; }
    .cat-b { background:#fef9c3; color:#92400e; }
    .liga-card { background:var(--card); border-radius:16px; border:1.5px solid var(--borde); overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:8px; }
    .liga-header { display:flex; align-items:center; gap:10px; padding:12px 14px; cursor:pointer; user-select:none; }
    .liga-ico { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .liga-ico img { width:36px; height:36px; object-fit:contain; }
    .liga-info { flex:1; min-width:0; }
    .liga-nombre { font-size:13px; font-weight:900; color:var(--texto); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .liga-meta { font-size:11px; font-weight:600; color:var(--sub); margin-top:3px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .liga-arrow { font-size:12px; color:var(--sutil); transition:transform .2s; flex-shrink:0; }
    .liga-arrow.open { transform:rotate(180deg); }
    .liga-body { display:none; border-top:1.5px solid var(--fondo); padding:12px 14px; flex-direction:column; gap:8px; }
    .liga-body.open { display:flex; }
    .action-btns { display:flex; gap:6px; }
    .abtn { flex:1; padding:10px 4px 8px; border-radius:12px; border:1.5px solid var(--borde); background:var(--card); font-family:Nunito,sans-serif; font-size:10px; font-weight:900; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; transition:all .15s; color:var(--texto); }
    .abtn img { width:32px; height:32px; object-fit:contain; }
    .abtn.prim { background:#eff6ff; border-color:#bfdbfe; color:var(--azul); }
    .abtn.prim:hover { background:#dbeafe; }
    .abtn:not(.prim):not(.disabled):hover { background:#f8fafc; }
    .abtn.disabled { opacity:.3; pointer-events:none; filter:grayscale(.8); }
    .abtn-del { padding:9px; border-radius:10px; border:1.5px solid #fee2e2; background:#fff5f5; color:var(--rojo); font-family:Nunito,sans-serif; font-size:11px; font-weight:900; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:6px; }
    .abtn-del:hover { background:#fee2e2; }
    .sec-label { font-size:10px; font-weight:900; color:var(--sutil); text-transform:uppercase; letter-spacing:.5px; margin:12px 0 6px; }
    .alerta-card { border-radius:12px; padding:10px 13px; margin-bottom:7px; cursor:pointer; border-left:3px solid; }
    .alerta-r { border-color:var(--rojo); background:#fff5f5; }
    .alerta-titulo { font-size:12px; font-weight:800; }
    .alerta-sub { font-size:10px; font-weight:600; color:var(--sutil); margin-top:2px; }
    .search { background:var(--card); border:1.5px solid var(--borde); border-radius:12px; padding:9px 12px; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .search svg { width:16px; height:16px; color:var(--sutil); flex-shrink:0; }
    .search input { border:none; outline:none; font-family:Nunito,sans-serif; font-size:13px; font-weight:600; color:var(--texto); background:transparent; width:100%; }
  </style>
</head>
<body>
<div class="page">
  <div id="header-container"></div>
  <nav id="nav-container"></nav>
  <main class="content">
    <div id="ligas-titulo" style="font-size:18px;font-weight:900;color:var(--texto);margin:4px 0 10px;padding-left:2px">Ligas</div>
    <div id="alertas-wrap"></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="buscador" type="text" placeholder="Buscar liga o torneo..." oninput="filtrar()">
    </div>
    <div id="ligas-wrap"><div class="loading"><div class="spinner"></div></div></div>
  </main>
  <button class="fab" onclick="window.location.href='nueva-liga.html'">+</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../ligas/js/store-liga.js"></script>
<script src="../ligas/js/ui.js"></script>
<script>

let _ligas = [];

function renderKPIs() {
  const el = document.getElementById('ligas-titulo');
  if (el) el.textContent = 'Inicio';
}

async function renderAlertas() {
  const wrap = document.getElementById('alertas-wrap');
  const activas = _ligas.filter(l => l.estado === 'activa');
  if (!activas.length) { wrap.innerHTML = ''; return; }
  let html = `<div class="sec-label">Acciones pendientes</div>`;
  for (const liga of activas.slice(0,3)) {
    const { data: p } = await _sb.from('lp_partidos').select('id',{count:'exact'}).eq('liga_id',liga.id).eq('estado','pendiente');
    const n = p?.length||0;
    if (n > 0) html += `<div class="alerta-card alerta-r" onclick="window.location.href='liga.html?id=${liga.id}&tab=resultados'">
      <div class="alerta-titulo" style="color:var(--rojo)">${n} resultado${n>1?'s':''} sin anotar</div>
      <div class="alerta-sub">${liga.nombre}</div></div>`;
  }
  wrap.innerHTML = html;
}

function filtrar() {
  const q = (document.getElementById('buscador')?.value||'').toLowerCase().trim();
  renderLigas(q ? _ligas.filter(l => l.nombre.toLowerCase().includes(q)) : _ligas);
}

function renderLigas(lista) {
  lista = lista || _ligas;
  const wrap = document.getElementById('ligas-wrap');
  if (!lista.length) {
    wrap.innerHTML = `<div class="loading" style="flex-direction:column;gap:12px;padding:40px 16px">
      <div style="font-size:36px">&#127942;</div>
      <div style="font-size:14px;font-weight:800;color:var(--texto)">Crea tu primera liga</div>
      <div style="font-size:12px;font-weight:600;color:var(--sutil);text-align:center">Pulsa el boton + para empezar</div></div>`;
    return;
  }
  const activas     = lista.filter(l => l.estado !== 'finalizada');
  const finalizadas = lista.filter(l => l.estado === 'finalizada');
  let html = '';
  if (activas.length)     { html += `<div class="sec-label">En curso</div>`;                            activas.forEach(l => html += cardLiga(l)); }
  if (finalizadas.length) { html += `<div class="sec-label" style="margin-top:16px">Finalizadas</div>`; finalizadas.forEach(l => html += cardLiga(l)); }
  wrap.innerHTML = html;
}

function cardLiga(l) {
  const nParejas = l.lp_parejas?.[0]?.count||0;
  const catColor = {Masculina:'cat-m',Femenina:'cat-f',Mixta:'cat-x'};
  const catCls   = catColor[l.categoria]||'cat-b';
  const estados  = {borrador:'Borrador',inscripcion:'Inscripcion abierta',activa:'Activa',fase_final:'Fase final',finalizada:'Finalizada'};
  const icoBg    = {inscripcion:'#eff6ff',activa:'#dcfce7',fase_final:'#fef9c3',finalizada:'#f1f5f9',borrador:'#f8fafc'};
  const insOk    = ['borrador','inscripcion'].includes(l.estado);
  const calOk    = ['activa','fase_final','finalizada'].includes(l.estado);
  const gestOk   = ['activa','fase_final','finalizada'].includes(l.estado);
  return `<div class="liga-card">
    <div class="liga-header" onclick="toggleCard(this)">
      <div class="liga-ico" style="background:${icoBg[l.estado]||'#f1f5f9'}"><img src="icons/ligas.png"></div>
      <div class="liga-info">
        <div class="liga-nombre">${l.nombre}</div>
        <div class="liga-meta">
          <span class="cat-chip ${catCls}">${l.categoria||'Sin cat.'}</span>
          <span>&middot;</span><span>${nParejas} pareja${nParejas!==1?'s':''}</span>
          <span>&middot;</span><span class="chip c-${l.estado}">${estados[l.estado]||l.estado}</span>
        </div>
      </div>
      <div class="liga-arrow">&#9660;</div>
    </div>
    <div class="liga-body">
      <div class="action-btns">
        <button class="abtn ${insOk?'prim':'disabled'}" onclick="event.stopPropagation();window.location.href='inscripciones.html?id=${l.id}'">
          <img src="icons/inscripciones.png">Inscripciones</button>
        <button class="abtn ${calOk?'prim':'disabled'}" onclick="event.stopPropagation();window.location.href='liga.html?id=${l.id}&tab=calendario'">
          <img src="icons/calendario.png">Calendario</button>
        <button class="abtn ${gestOk?'prim':'disabled'}" onclick="event.stopPropagation();window.location.href='liga.html?id=${l.id}&tab=resultados'">
          <img src="icons/gestionar.png">Gestionar</button>
      </div>
      <button class="abtn-del" onclick="event.stopPropagation();eliminarLiga('${l.id}','${l.nombre.replace(/'/g,'\x27')}')">
        &#128465; Eliminar liga</button>
    </div>
  </div>`;
}

function toggleCard(header) {
  const arrow  = header.querySelector('.liga-arrow');
  const body   = header.nextElementSibling;
  const isOpen = body.classList.contains('open');
  document.querySelectorAll('.liga-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.liga-arrow').forEach(a => a.classList.remove('open'));
  if (!isOpen) { body.classList.add('open'); arrow.classList.add('open'); }
}

async function eliminarLiga(id, nombre) {
  if (!confirm('Eliminar la liga "' + nombre + '"? Esta accion no se puede deshacer.')) return;
  await lpDeleteLiga(id);
  _ligas = _ligas.filter(l => l.id !== id);
  renderKPIs(); renderLigas(); toast('Liga eliminada');
}

async function init() {
  renderHeader({ titulo:'LigaPadel', subtitulo:'Gestion de ligas', icono:'icons/inicio-liga.png', botonDerecho:null });
  renderNav('inicio');
  const ok = await lpInit(); if (!ok) return;
  await lpGetOrganizador();
  showLoading('ligas-wrap');
  _ligas = await lpGetLigas();
  renderKPIs(); renderLigas(); await renderAlertas();
}
init();
</script>
</body>
</html>
